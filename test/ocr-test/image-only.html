<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Test - Image Only</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #111;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <section class="grid">
      <img src="../image/judol-1.png" alt="" />
      <img src="../image/judol-2.png" alt="" />
      <img src="../image/judol-3.png" alt="" />
      <img src="../image/judol-4.png" alt="" />
      <img src="../image/judol-5.png" alt="" />
      <img src="../image/judol-6.png" alt="" />
      <img src="../image/judol-7.png" alt="" />
    </section>
  </body>
</html>
