<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Test - Mixed</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 32px;
        line-height: 1.6;
        background: #f5f5f5;
        color: #111;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
      }
      .text-block {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="text-block">
        <h1>Konten Judol Campuran</h1>
        <p>Slot gacor, jackpot, maxwin, dan bonus deposit menjadi daya tarik utama bagi pemain.</p>
        <p>Promo freespin dan peluang menang besar sering dipakai untuk menarik perhatian pengguna baru.</p>
      </section>

      <section class="grid">
        <img src="../image/judol-1.png" alt="" />
        <img src="../image/judol-2.png" alt="" />
        <img src="../image/judol-3.png" alt="" />
        <img src="../image/judol-4.png" alt="" />
        <img src="../image/judol-5.png" alt="" />
        <img src="../image/judol-6.png" alt="" />
        <img src="../image/judol-7.png" alt="" />
      </section>
    </main>
  </body>
</html>
